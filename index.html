<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History CLIL Interactive Reader</title>
    <!-- Tailwind CSS via CDN om het ontwerp te behouden zonder build tools -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom animaties die Tailwind niet standaard via CDN heeft zonder config */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translate(-50%, 10px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }
        
        .tooltip-anim {
            animation: fadeIn 0.2s ease-out, slideUp 0.3s ease-out forwards;
        }

        .word-interactive {
            transition: all 0.2s ease;
        }
        
        .word-active {
            background-color: #4f46e5 !important; /* indigo-600 */
            color: white !important;
            border-color: #3730a3 !important; /* indigo-800 */
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            transform: scale(1.05);
        }
    </style>
</head>
<body class="min-h-screen bg-slate-100 p-4 md:p-8 font-sans">

    <!-- Hoofdcontainer -->
    <div id="app-container" class="max-w-5xl mx-auto bg-white rounded-[2.5rem] shadow-2xl relative overflow-visible">
        
        <!-- Header -->
        <div class="bg-indigo-950 px-10 py-5 flex items-center justify-between border-b border-indigo-900/50 rounded-t-[2.5rem]">
           <div class="flex items-center gap-3">
             <div class="w-2 h-8 bg-indigo-500 rounded-full"></div>
             <h2 class="text-indigo-100 text-base font-black uppercase tracking-[0.2em]">
               2 The evolution of the human species
             </h2>
           </div>
           <div class="text-indigo-400 text-[10px] font-bold tracking-widest uppercase hidden md:block text-right">
             Interactive CLIL Learning Environment
           </div>
        </div>

        <!-- Tabbladen (Sources) -->
        <div id="tabs-container" class="bg-indigo-900/90 p-4 flex gap-3 overflow-x-auto border-b border-indigo-800">
            <!-- Dynamisch ingeladen via JS -->
        </div>

        <!-- Dynamische Source Header -->
        <div class="bg-indigo-700 p-10 text-white relative">
          <div class="absolute top-0 right-0 p-8 opacity-10" id="header-bg-icon">
            <!-- Icon -->
          </div>
          <div class="flex items-center gap-4 mb-4 relative z-10">
            <div class="bg-white/20 p-3 rounded-2xl backdrop-blur-md" id="header-icon">
              <!-- Icon -->
            </div>
            <span class="text-indigo-100 uppercase tracking-[0.3em] text-xs font-black font-mono" id="source-subtitle">Source 1</span>
          </div>
          <h1 class="text-3xl md:text-5xl font-black leading-tight relative z-10 tracking-tight" id="source-title">
            <!-- Title -->
          </h1>
        </div>

        <!-- Niveau Selector -->
        <div class="flex flex-col lg:flex-row lg:items-center justify-between p-8 bg-slate-50 border-b border-slate-200 gap-6 shadow-inner">
          <div class="flex items-center gap-4">
            <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest italic">Difficulty:</span>
            <div class="flex bg-slate-200 rounded-2xl p-1.5 shadow-inner gap-1 overflow-x-auto" id="levels-container">
              <!-- Dynamisch ingeladen via JS -->
            </div>
          </div>
          <div class="flex items-center text-[10px] font-black text-indigo-700 bg-indigo-50 px-5 py-2.5 rounded-2xl gap-3 border border-indigo-100 shadow-sm uppercase tracking-widest">
            <span id="icon-mouse" class="animate-bounce"></span>
            <span>Click 1x: English | Click 2x: Dutch & French</span>
          </div>
        </div>

        <!-- Interactieve Tekst Container -->
        <div class="p-10 md:p-24 relative min-h-[500px] transition-all duration-500" id="main-content-area">
          <div class="space-y-6">
            <div class="flex justify-between items-center mb-2 pb-4 border-b border-slate-200">
              <span class="text-xs font-black text-slate-400 uppercase tracking-widest">Article Content</span>
              <button id="read-full-btn" class="flex items-center gap-2 px-5 py-2.5 rounded-full font-black text-[10px] uppercase tracking-widest transition-all bg-indigo-50 text-indigo-600 hover:bg-indigo-100 hover:shadow-md border border-indigo-100 hover:scale-105">
                <span id="read-full-icon"></span>
                <span id="read-full-text">Read text</span>
              </button>
            </div>
            
            <div id="text-content" class="space-y-6">
              <!-- Dynamische tekst komt hier -->
            </div>
            
            <p id="source-info" class="text-xs text-gray-400 mt-8 italic border-t pt-4 font-mono"></p>
          </div>

          <!-- Tooltip (Verborgen bij de start) -->
          <div id="tooltip" class="absolute z-50 hidden tooltip-anim" style="transform: translateX(-50%);">
            <div class="bg-indigo-950 text-white rounded-[2rem] shadow-[0_20px_50px_rgba(0,0,0,0.5)] p-7 w-80 border-2 border-indigo-400 relative">
              <button id="close-tooltip" class="absolute -top-3 -right-3 bg-red-500 text-white rounded-full p-2 hover:bg-red-600 transition-transform hover:scale-110 shadow-xl border-2 border-white">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
              </button>

              <div class="flex items-center justify-between mb-4 pb-4 border-b border-indigo-800/50">
                <h3 id="tt-word" class="text-2xl font-black text-white capitalize tracking-tight"></h3>
                <button id="tt-speak" class="bg-indigo-600 hover:bg-indigo-400 text-white p-2.5 rounded-full shadow-[0_0_15px_rgba(79,70,229,0.5)] transition-all hover:scale-110 active:scale-95 flex items-center justify-center border border-indigo-400 group" title="Beluister de Britse uitspraak">
                  <span id="tt-speak-icon" class="group-hover:animate-pulse"></span>
                </button>
              </div>

              <div class="mb-4">
                <div class="flex items-center gap-2 mb-2 opacity-70">
                  <span id="tt-book-icon" class="text-indigo-300"></span>
                  <span class="text-indigo-300 font-black text-[9px] uppercase tracking-[0.2em]">English Definition</span>
                </div>
                <p id="tt-info" class="text-xl text-white font-semibold leading-snug"></p>
              </div>

              <div id="tt-translation-container" class="mt-5 pt-5 border-t border-indigo-800 transition-all duration-500">
                <!-- Wordt ingevuld via JS -->
              </div>
              
              <!-- Pijltje Tooltip -->
              <div id="tt-arrow" class="absolute -bottom-2 w-5 h-5 bg-indigo-950 rotate-45 border-r-2 border-b-2 border-indigo-400 shadow-xl"></div>
            </div>
          </div>
        </div>

        <!-- Footer -->
        <div class="bg-slate-50 p-10 text-center text-[10px] text-slate-400 border-t border-slate-200 flex flex-col md:flex-row justify-between items-center gap-4 px-16 uppercase tracking-[0.1em] font-black rounded-b-[2.5rem]">
          <div class="flex items-center gap-6">
            <span class="bg-slate-200 px-4 py-2 rounded-xl text-slate-500">Multilingual CLIL Engine v5.2</span>
            <span class="text-indigo-300 font-black tracking-widest">History Education Focus</span>
          </div>
          <p class="opacity-50 tracking-tighter italic">Source navigation enabled with difficulty scaling</p>
        </div>
    </div>

    <script>
        // --- 1. ICONEN (SVG Strings) ---
        const icons = {
            FileText: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>`,
            Info: `<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>`,
            InfoSmall: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>`,
            Map: `<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"></polygon><line x1="8" y1="2" x2="8" y2="18"></line><line x1="16" y1="6" x2="16" y2="22"></line></svg>`,
            History: `<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path><path d="M12 7v5l4 2"></path></svg>`,
            HistoryLarge: `<svg width="140" height="140" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path><path d="M12 7v5l4 2"></path></svg>`,
            Leaf: `<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"></path><path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"></path></svg>`,
            Palette: `<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="13.5" cy="6.5" r=".5" fill="currentColor"></circle><circle cx="17.5" cy="10.5" r=".5" fill="currentColor"></circle><circle cx="8.5" cy="7.5" r=".5" fill="currentColor"></circle><circle cx="6.5" cy="12.5" r=".5" fill="currentColor"></circle><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"></path></svg>`,
            GraduationCap: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.42 10.922a2 2 0 0 1-.01 2.83l-7.1 7.1a2 2 0 0 1-2.83 0l-7.1-7.1a2 2 0 0 1-.01-2.83L11.233 4a2 2 0 0 1 2.828 0l6.89 6.89Z"></path><path d="M22 10v6"></path><path d="M6 12.5V16a6 3 0 0 0 12 0v-3.5"></path></svg>`,
            AlignLeft: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="21" y1="6" x2="3" y2="6"></line><line x1="15" y1="12" x2="3" y2="12"></line><line x1="17" y1="18" x2="3" y2="18"></line></svg>`,
            MousePointerClick: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 4.1 12 6"></path><path d="m5.1 8-2.9-.8"></path><path d="m6 12-1.9 2"></path><path d="M7.2 2.2 8 5.1"></path><path d="M9.037 9.69a.498.498 0 0 1 .653-.653l11 4.5a.5.5 0 0 1-.074.949l-4.349 1.041a1 1 0 0 0-.74.739l-1.04 4.35a.5.5 0 0 1-.95.074z"></path></svg>`,
            Volume2: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>`,
            Volume2Small: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>`,
            VolumeX: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line></svg>`,
            BookOpen: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>`,
            LanguagesYellow: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-yellow-400"><path d="m5 8 6 6"></path><path d="m4 14 6-6 2-3"></path><path d="M2 5h12"></path><path d="M7 2h1"></path><path d="m22 22-5-10-5 10"></path><path d="M14 18h6"></path></svg>`,
            LanguagesEmerald: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-emerald-400"><path d="m5 8 6 6"></path><path d="m4 14 6-6 2-3"></path><path d="M2 5h12"></path><path d="M7 2h1"></path><path d="m22 22-5-10-5 10"></path><path d="M14 18h6"></path></svg>`
        };

        // Static Icons injecten
        document.getElementById('icon-mouse').innerHTML = icons.MousePointerClick;
        document.getElementById('tt-speak-icon').innerHTML = icons.Volume2;
        document.getElementById('tt-book-icon').innerHTML = icons.BookOpen;

        // --- 2. DATA (Woordenboek & Content) ---
        const dictionary = {
            "skull": { nl: "schedel", fr: "crâne", info: "The bones of the head." },
            "species": { nl: "soort", fr: "espèce", info: "A group of living things (like humans or animals)." },
            "discovery": { nl: "ontdekking", fr: "découverte", info: "Finding something new." },
            "fossils": { nl: "fossielen", fr: "fossiles", info: "Old remains of plants or animals in rock." },
            "modern human": { nl: "de moderne mens", fr: "humain moderne", info: "People like us (Homo sapiens)." },
            "chin": { nl: "kin", fr: "menton", info: "The part of your face below your mouth." },
            "ancestor": { nl: "voorouder", fr: "ancêtre", info: "A family member from a long time ago." },
            "family tree": { nl: "stamboom", fr: "arbre généalogique", info: "A diagram showing family history." },
            "jaw": { nl: "kaak", fr: "mâchoire", info: "The bone used for eating and speaking." },
            "researchers": { nl: "onderzoekers", fr: "chercheurs", info: "People who study things to find facts." },
            "remarkable": { nl: "opmerkelijk", fr: "remarquable", info: "Something very special or unusual." },
            "characteristics": { nl: "kenmerken", fr: "caractéristiques", info: "Typical qualities of something." },
            "determined": { nl: "vastgesteld / bepaald", fr: "déterminé", info: "Decided or discovered for sure." },
            "previous": { nl: "vorige", fr: "précédent", info: "The one before this one." },
            "compared": { nl: "vergeleken", fr: "comparé", info: "Looking at two things to see differences." },
            "direct ancestor": { nl: "directe voorouder", fr: "ancêtre direct", info: "A family member you come from directly." },
            "origin": { nl: "oorsprong", fr: "origine", info: "Where something starts or comes from." },
            "confirmed": { nl: "bevestigd", fr: "confirmé", info: "Shown to be true." },
            "theory": { nl: "theorie", fr: "théorie", info: "An idea that explains how something works." },
            "concurrently": { nl: "tegelijkertijd", fr: "simultanément", info: "At the same time." },
            "ancient relative": { nl: "oude verwant", fr: "ancien parent", info: "A family member from a very long time ago." },
            "vertebrae": { nl: "wervels", fr: "vertèbres", info: "The bones in the back (spine)." },
            "international team": { nl: "internationaal team", fr: "équipe internationale", info: "Scientists from many different countries." },
            "climbed": { nl: "klom", fr: "grimpé", info: "Moved up using hands and feet." },
            "ape": { nl: "aap", fr: "singe", info: "An animal like a chimpanzee or gorilla." },
            "food waste": { nl: "voedselverspilling", fr: "gaspillage alimentaire", info: "Food that is thrown away instead of eaten." },
            "households": { nl: "huishoudens", fr: "ménages", info: "People living together in a house." },
            "reduction": { nl: "vermindering", fr: "réduction", info: "Making something smaller or less." },
            "economic loss": { nl: "economisch verlies", fr: "perte économique", info: "Losing money in a business or country." },
            "environment": { nl: "milieu", fr: "environnement", info: "The natural world around us (air, water, land)." },
            "proposal": { nl: "voorstel", fr: "proposition", info: "A plan or suggestion for people to consider." },
            "sustainable": { nl: "duurzaam", fr: "durable", info: "Good for the planet so it can last a long time." },
            "agriculture": { nl: "landbouw", fr: "agriculture", info: "Farming and growing food." },
            "annually": { nl: "jaarlijks", fr: "annuellement", info: "Happening every year." },
            "cave paintings": { nl: "rotstekeningen / grottekeningen", fr: "peintures rupestres", info: "Ancient art painted on the walls of a cave." },
            "island": { nl: "eiland", fr: "île", info: "A piece of land surrounded by water." },
            "uranium dating": { nl: "uraniumdatering", fr: "datation à l'uranium", info: "A scientific method to find out how old something is." },
            "originated": { nl: "ontstond", fr: "originaire", info: "Where or how something began." },
            "spread": { nl: "verspreidde", fr: "répandu", info: "Moved to many different places." },
            "ancient": { nl: "eeuwenoud", fr: "ancien", info: "From a very long time ago in history." },
            "descendants": { nl: "nakomelingen", fr: "descendants", info: "People who come from a specific ancestor." },
            "undiscovered": { nl: "onontdekt", fr: "non découvert", info: "Something that has not been found yet." },
            "hominin": { nl: "mensachtige", fr: "hominine", info: "A human-like species from history." },
            "descends": { nl: "stamt af", fr: "descend", info: "Comes from a previous generation or species." }
        };

        // Helper om interactieve woorden te genereren in HTML strings
        function w(text, id = "") {
            const wordKey = id || text.toLowerCase();
            return `<span class="word-interactive inline-block cursor-pointer border-b-2 border-dashed px-1 rounded mr-1 border-blue-400 bg-blue-50/50 text-blue-900 hover:bg-blue-100 hover:border-blue-600" data-word="${text}" data-id="${wordKey}">${text}</span>`;
        }

        const sourceContent = {
            1: {
                title: "New Human Species Found?",
                iconStr: 'Info',
                sourceInfo: "nu.nl (Aug 10, 2023)",
                levels: {
                    'A1': `<p>Scientists found a very old ${w('skull')} in China. The skull is 300,000 years old. It is a special ${w('discovery')}. It is perhaps a new human ${w('species')}.</p>
                           <div class="bg-blue-50 p-8 rounded-2xl border-l-8 border-blue-500 my-10 shadow-sm font-medium">
                             <h3 class="font-bold text-blue-900 mb-2 font-mono uppercase text-sm tracking-widest text-center">Summary</h3>
                             <p>The skull is from a child. The child was 12 or 13 years old. The skull is different from other ${w('fossils')}. It looks like a ${w('modern human')}, but there is one big difference: the skull has no ${w('chin')}.</p>
                           </div>
                           <p>Because there is no chin, the skull looks like a <strong>Denisovan</strong>. Modern humans and Denisovans come from the same ${w('ancestor')}: <em>Homo erectus</em>.</p>`,
                    
                    'A2': `<p>${w('Researchers')} discovered a ${w('remarkable')} find in the Hualongdong region of China. They found a ${w('skull')} that is 300,000 years old. New studies suggest this could be a new human ${w('species')} that we did not know before.</p>
                           <div class="bg-blue-50 p-8 rounded-2xl border-l-8 border-blue-500 my-10 shadow-sm font-medium text-center">
                             <h3 class="font-bold text-blue-900 mb-2 font-mono uppercase text-sm tracking-widest">Key Features</h3>
                             <p>The skull belonged to a teenager. While it has the shape of a ${w('modern human')}, it lacks a ${w('chin')}. This is a very important difference ${w('compared')} to ${w('previous')} finds.</p>
                           </div>
                           <p>This human relative looks more like a <strong>Denisovan</strong>. Scientists ${w('compared')} the jaw to other humans from the Pleistocene era. They found that the ${w('jaw')} has ${w('characteristics')} of both modern and ancient humans.</p>`,
                    
                    'Original': `<div class="space-y-4 text-gray-700 leading-relaxed italic border-l-4 border-indigo-200 pl-6 py-2">
                                   <p>A few years ago, scientists found a 300,000-year-old ${w('skull')} in the Hualongdong region of China. New research suggests it might be the remains of a previously ${w('undiscovered')} human ${w('species')}.</p>
                                   <p>The skull probably belonged to a twelve- or thirteen-year-old and differs from earlier finds. It has the same shape as the ${w('modern human')} skull but features another ${w('remarkable')} ${w('characteristic', 'characteristics')}: a ${w('chin')} appears to be missing. This makes this ${w('hominin')} look more like a <strong>Denisovan</strong>.</p>
                                   <p>Both modern humans and Denisovans are ${w('descendants')} of <em>Homo erectus</em>. ${w('Researchers')} ${w('compared')} the found skull with those of modern humans and ${w('hominins', 'hominin')} from the Pleistocene (about 2.3 million to 10,000 years ago). They discovered that the lower ${w('jaw')} has ${w('characteristics')} of both species. This could mean that a new species will soon be added to the human ${w('family tree')}. "More ${w('fossils')} and research are needed to determine the exact position in the human family tree," says one of the scientists.</p>
                                 </div>`
                }
            },
            2: {
                title: "Homo erectus in South Africa",
                iconStr: 'Map',
                sourceInfo: "Luc De Roy (vrtnws.be, Apr 5, 2020)",
                levels: {
                    'A1': `<p>Scientists found the oldest ${w('skull')} of <em>Homo erectus</em> in South Africa. <em>Homo erectus</em> is a ${w('direct ancestor')} of humans today.</p>
                           <p>This ${w('discovery')} shows that <em>Homo erectus</em> is older than we thought. It also shows the ${w('theory')} that this species started in Africa is correct.</p>`,
                    
                    'A2': `<p>In South Africa, researchers found the oldest ${w('skull')} of <em>Homo erectus</em> ever discovered. This species is a ${w('direct ancestor')} of modern humans.</p>
                           <p>This find means that <em>Homo erectus</em> existed ${w('concurrently')} with two other human species 2 million years ago. This ${w('discovery')} also ${w('confirmed')} the ${w('theory')} that the ${w('origin')} of <em>Homo erectus</em> was in Africa.</p>`,
                    
                    'Original': `<div class="space-y-4 text-gray-700 leading-relaxed italic border-l-4 border-indigo-200 pl-6 py-2">

                                   <p>This means not only that <em>Homo erectus</em> is older than previously thought, but also that two million years ago, three ${w('species')} of ${w('hominins', 'hominin')} lived ${w('concurrently')} in South Africa. The find also ${w('confirmed')} the ${w('theory')} that <em>Homo erectus</em> ${w('originated')} in Africa.</p>
                                 </div>`
                }
            },
            3: {
                title: "Australopithecus: Ape or Human?",
                iconStr: 'History',
                sourceInfo: "Luc De Roy (vrtnws.be, Nov 26, 2021)",
                levels: {
                    'A1': `<p>Scientists studied an ${w('ancient relative')} called <em>Australopithecus sediba</em>. This species lived 2 million years ago.</p>
                           <p>It was very special. It ${w('climbed')} trees like an ${w('ape')}, but it ${w('walked', 'walked')} on its legs like a human.</p>`,
                    
                    'A2': `<p>An ${w('international team')} of scientists studied <em>Australopithecus sediba</em>, an ${w('ancient relative')} of humans from 2 million years ago.</p>
                           <p>Based on newly discovered fossil ${w('vertebrae')}, they found that this species used its arms to ${w('climb', 'climbed')} like an ${w('ape')}, but used its legs to walk like a human.</p>`,
                    
                    'Original': `<div class="space-y-4 text-gray-700 leading-relaxed italic border-l-4 border-indigo-200 pl-6 py-2">
                                   <p>The ${w('ancient')} human relative <em>Australopithecus sediba</em> "walked like a human, but ${w('climbed')} like an ${w('ape')}."</p>
                                   <p><em>Australopithecus sediba</em>, a 2-million-year-old human relative, used its arms to climb like an ${w('ape')} and its legs to walk like a human. An ${w('international team')} of scientists stated this based on newly discovered ${w('fossil')} ${w('vertebrae')} of the species.</p>
                                 </div>`
                }
            },
            4: {
                title: "Fighting Food Waste in Europe",
                iconStr: 'Leaf',
                sourceInfo: "fepex.es / biojournaal.nl (Sep 20, 2023)",
                levels: {
                    'A1': `<p>The European Commission wants a ${w('reduction')} in ${w('food waste')}. Their goal is 30% less waste by the year 2030.</p>
                           <p>Most waste (53%) happens in our <strong>homes</strong>. This waste costs 132 billion euros. We must stop this ${w('economic loss')} to help the ${w('environment')}.</p>`,
                    
                    'A2': `<p>The European Commission has a new ${w('proposal')}. They want member states to cut ${w('food waste')} by 30% per person by 2030. Every year, we waste 89 million tons of food ${w('annually')}.</p>
                           <p>Research shows that 53% of waste occurs in ${w('households')}. This waste results in a huge ${w('economic loss')} of 132 billion euros.</p>`,
                    
                    'Original': `<div class="space-y-4 text-gray-700 leading-relaxed italic border-l-4 border-indigo-200 pl-6 py-2">
                                   <p>Europe wants to reduce ${w('food waste')} by 30%.</p>
                                   <p>The European Commission wants the member states to reduce the waste of food by 30% per person by 2030.</p>
                                   <p>The European Commission estimates that the majority of our ${w('food waste')}, 53%, occurs in ${w('households')}. The other 47% happens at supermarkets, restaurants and hotels, ${w('agriculture')}, and food processing and production.</p>
                                   <p>This means that we waste approximately 89 million tons of food per year (= 131 kilos per inhabitant). This in turn leads to an ${w('economic loss')} of 132 billion euros... and that is without counting the impact on our ${w('environment')}.</p>
                                   <p>Therefore, the European Commission proposes reducing the ${w('food waste')} per ${w('household', 'households')} by 30% between now and 2030. Other sectors will also have to contribute. This ${w('proposal')} contributes to reaching the ${w('Sustainable')} Development Goals of the United Nations.</p>
                                 </div>`
                }
            },
            5: {
                title: "Ancient Cave Art in Sulawesi",
                iconStr: 'Palette',
                sourceInfo: "historiek.net (Oct 9, 2014)",
                levels: {
                    'A1': `<p>Scientists found 40,000 year old art in a cave in Indonesia. It is on an ${w('island')} called Sulawesi. It is the oldest ${w('cave paintings')} in the world.</p>
                           <p>Before this, people thought art started in Europe. But now we know it started in Asia too.</p>`,
                    
                    'A2': `<p>${w('Researchers')} discovered ${w('cave paintings')} in Sulawesi that are at least 40,000 years old. This makes them the oldest known cave art in the world.</p>
                           <p>${w('Uranium dating')} has now proven that some were created much earlier than we thought. Painting now appears not to be an exclusively European phenomenon.</p>`,
                    
                    'Original': `<div class="space-y-4 text-gray-700 leading-relaxed italic border-l-4 border-indigo-200 pl-6 py-2">
                                   <p>40,000-year-old art found on Sulawesi. In a cave on the Indonesian ${w('island')} of Sulawesi, ${w('researchers')} have found rock paintings that are said to be at least 40,000 years old. According to the researchers, this makes it the oldest known ${w('cave art', 'cave paintings')} in the world.</p>
                                   <p>The existence of the paintings has been known for some time, but it was always assumed they were approximately 10,000 years old. ${w('Uranium dating')} has now shown, however, that some of the drawings were already made 40,000 years ago.</p>
                                   <p>This is ${w('remarkable')}, because until now it was assumed that rock art ${w('originated')} in Europe. Painting now appears not to be an exclusively European phenomenon. The researchers, who published their findings in the magazine <em>Nature</em>, even suggest that art possibly ${w('originated')} before humans ${w('spread')} from Africa. On Sulawesi, images of various hands have been found. The oldest appears to have been made 40,000 years ago and the youngest about 17,500 years ago. Images of animals have also been found.</p>
                                 </div>`
                }
            }
        };

        const levelsDef = [
            { id: 'A1', label: 'A1 Beginner', iconStr: 'GraduationCap' },
            { id: 'A2', label: 'A2 Elementary', iconStr: 'InfoSmall' },
            { id: 'Original', label: 'Original Text (English)', iconStr: 'AlignLeft' }
        ];

        // --- 3. STATE ---
        let currentSource = 1;
        let currentLevel = 'A1';
        let activeWordData = null; // null of { word, ...dictionaryEntry, showTranslation: bool }
        let isReadingFull = false;
        let activeWordElement = null; // Refentie naar de HTML node

        // --- 4. DOM ELEMENTEN & RENDER LOGICA ---
        const ui = {
            tabsContainer: document.getElementById('tabs-container'),
            levelsContainer: document.getElementById('levels-container'),
            textContent: document.getElementById('text-content'),
            sourceTitle: document.getElementById('source-title'),
            sourceSubtitle: document.getElementById('source-subtitle'),
            sourceInfo: document.getElementById('source-info'),
            headerIcon: document.getElementById('header-icon'),
            headerBgIcon: document.getElementById('header-bg-icon'),
            
            tooltip: document.getElementById('tooltip'),
            ttWord: document.getElementById('tt-word'),
            ttInfo: document.getElementById('tt-info'),
            ttTranslationContainer: document.getElementById('tt-translation-container'),
            ttArrow: document.getElementById('tt-arrow'),
            
            readFullBtn: document.getElementById('read-full-btn'),
            readFullIcon: document.getElementById('read-full-icon'),
            readFullText: document.getElementById('read-full-text'),
            appContainer: document.getElementById('app-container')
        };

        function renderTabs() {
            ui.tabsContainer.innerHTML = '';
            [1, 2, 3, 4, 5].forEach(s => {
                const isSelected = currentSource === s;
                const btn = document.createElement('button');
                btn.className = `flex items-center gap-2 px-6 py-2.5 rounded-2xl text-xs font-black transition-all whitespace-nowrap tracking-wider uppercase ${isSelected ? 'bg-indigo-600 text-white shadow-[0_5px_15px_rgba(0,0,0,0.3)] scale-105' : 'text-indigo-300 hover:bg-indigo-800/50 hover:text-white'}`;
                btn.innerHTML = `${icons.FileText} Source ${s}`;
                btn.onclick = () => { 
                    currentSource = s; 
                    closeTooltip();
                    stopSpeech();
                    renderAll(); 
                };
                ui.tabsContainer.appendChild(btn);
            });
        }

        function renderLevels() {
            ui.levelsContainer.innerHTML = '';
            levelsDef.forEach(lvl => {
                const isSelected = currentLevel === lvl.id;
                const btn = document.createElement('button');
                btn.className = `px-5 py-2.5 rounded-xl text-xs font-black transition-all duration-300 flex items-center gap-2 whitespace-nowrap ${isSelected ? 'bg-white shadow-xl text-indigo-700' : 'text-slate-500 hover:text-indigo-600'}`;
                btn.innerHTML = `${icons[lvl.iconStr]} ${lvl.label}`;
                btn.onclick = () => { 
                    currentLevel = lvl.id; 
                    closeTooltip();
                    stopSpeech();
                    renderAll(); 
                };
                ui.levelsContainer.appendChild(btn);
            });
        }

        function renderContent() {
            const data = sourceContent[currentSource];
            
            // Update Header
            ui.sourceTitle.innerText = data.title;
            ui.sourceSubtitle.innerText = `Source ${currentSource}`;
            ui.headerIcon.innerHTML = icons[data.iconStr];
            ui.headerBgIcon.innerHTML = icons.HistoryLarge; // Achtergrond icoon
            
            // Update Text
            ui.textContent.innerHTML = data.levels[currentLevel];
            ui.sourceInfo.innerText = `Original Source: ${data.sourceInfo}`;
            
            // Reset "Read Full" button status
            updateReadFullButtonUI();
        }

        function renderAll() {
            renderTabs();
            renderLevels();
            renderContent();
        }

        // --- 5. INTERACTIE (Tooltips & Klikken) ---
        function closeTooltip() {
            if (!activeWordData) return;
            activeWordData = null;
            ui.tooltip.classList.add('hidden');
            if (activeWordElement) {
                activeWordElement.classList.remove('word-active');
                activeWordElement = null;
            }
        }

        function handleWordClick(element, e) {
            e.stopPropagation();
            
            const wordText = element.getAttribute('data-word');
            const wordId = element.getAttribute('data-id');
            const entry = dictionary[wordId];
            
            if (!entry) return;

            // Als we op hetzelfde woord klikken...
            if (activeWordData && activeWordData.word === wordText) {
                if (!activeWordData.showTranslation) {
                    // Tweede klik: Toon vertaling
                    activeWordData.showTranslation = true;
                    renderTooltipContent();
                } else {
                    // Derde klik: Sluit tooltip
                    closeTooltip();
                }
                return;
            }

            // Nieuw woord aangeklikt
            closeTooltip(); // Sluit eventueel vorig woord
            activeWordElement = element;
            activeWordElement.classList.add('word-active');
            
            activeWordData = {
                word: wordText,
                ...entry,
                showTranslation: false
            };

            renderTooltipContent();
            ui.tooltip.classList.remove('hidden');
            positionTooltip(element);
        }

        function renderTooltipContent() {
            if (!activeWordData) return;
            
            ui.ttWord.innerText = activeWordData.word;
            ui.ttInfo.innerText = `"${activeWordData.info}"`;

            if (activeWordData.showTranslation) {
                ui.ttTranslationContainer.innerHTML = `
                    <div class="flex flex-col gap-4">
                      <div>
                        <div class="flex items-center gap-2 mb-1 opacity-70">
                          ${icons.LanguagesYellow}
                          <span class="text-yellow-400 font-black text-[9px] uppercase tracking-[0.2em] italic">Dutch Translation</span>
                        </div>
                        <p class="text-2xl font-black text-yellow-400 tracking-tight leading-none uppercase">${activeWordData.nl}</p>
                      </div>
                      <div>
                        <div class="flex items-center gap-2 mb-1 opacity-70">
                          ${icons.LanguagesEmerald}
                          <span class="text-emerald-400 font-black text-[9px] uppercase tracking-[0.2em] italic">French Translation</span>
                        </div>
                        <p class="text-2xl font-black text-emerald-400 tracking-tight leading-none uppercase">${activeWordData.fr}</p>
                      </div>
                    </div>
                `;
                ui.ttTranslationContainer.classList.remove('opacity-0');
            } else {
                ui.ttTranslationContainer.innerHTML = `
                    <div class="text-[10px] font-black text-indigo-400 uppercase tracking-[0.2em] text-center italic cursor-pointer animate-pulse bg-indigo-900/40 py-3 rounded-xl border border-indigo-800 border-dashed" onclick="triggerTranslation()">Click again for Dutch & French</div>
                `;
            }
        }

        // Helper voor de inline "Click again" knop
        window.triggerTranslation = () => {
            if(activeWordData) {
                activeWordData.showTranslation = true;
                renderTooltipContent();
            }
        };

        function positionTooltip(targetElement) {
            const rect = targetElement.getBoundingClientRect();
            const containerRect = ui.appContainer.getBoundingClientRect();
            
            const tooltipWidth = 320; 
            const padding = 20;
            const containerWidth = ui.appContainer.offsetWidth;
            const containerHeight = ui.appContainer.offsetHeight;
            
            // X Positie
            let displayLeft = rect.left - containerRect.left + (rect.width / 2);
            const minLeft = tooltipWidth / 2 + padding;
            const maxLeft = containerWidth - (tooltipWidth / 2) - padding;
            const constrainedLeft = Math.max(minLeft, Math.min(maxLeft, displayLeft));
            const arrowOffset = displayLeft - constrainedLeft;

            // Y Positie (van onderaf gemeten voor veilige expansie)
            const topPosRelativeToContainer = rect.top - containerRect.top;
            const bottomPos = containerHeight - topPosRelativeToContainer + 15;

            ui.tooltip.style.bottom = `${bottomPos}px`;
            ui.tooltip.style.left = `${constrainedLeft}px`;
            ui.ttArrow.style.left = `calc(50% + ${arrowOffset}px)`;
        }

        // Event delegatie voor de interactieve woorden en buitenkliks
        document.addEventListener('click', (e) => {
            const wordEl = e.target.closest('.word-interactive');
            if (wordEl) {
                handleWordClick(wordEl, e);
            } else if (!e.target.closest('#tooltip')) {
                closeTooltip();
            }
        });

        // --- 6. TEXT TO SPEECH (Web Speech API) ---
        function loadVoices() {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.getVoices();
            }
        }

        function getPreferredVoice() {
            const voices = window.speechSynthesis.getVoices();
            return voices.find(v => 
                v.lang === 'en-GB' && (v.name.includes('Google') || v.name.includes('Natural') || v.name.includes('Daniel') || v.name.includes('Oliver') || v.name.includes('Serena'))
            ) || voices.find(v => v.lang === 'en-GB');
        }

        function speakWord(text, e) {
            e.stopPropagation();
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                isReadingFull = false;
                updateReadFullButtonUI();
                
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-GB';
                utterance.rate = 0.85;
                
                const voice = getPreferredVoice();
                if (voice) utterance.voice = voice;
                
                window.speechSynthesis.speak(utterance);
            }
        }

        document.getElementById('tt-speak').addEventListener('click', (e) => {
            if(activeWordData) speakWord(activeWordData.word, e);
        });

        function toggleReadFullText(e) {
            e.stopPropagation();
            if (!('speechSynthesis' in window)) return;

            if (isReadingFull) {
                stopSpeech();
                return;
            }

            window.speechSynthesis.cancel();
            
            // Haal platte tekst op zonder HTML (vergelijkbaar met innerText in React ref)
            const textToRead = ui.textContent.innerText || "";
            
            const utterance = new SpeechSynthesisUtterance(textToRead);
            utterance.lang = 'en-GB';
            utterance.rate = 0.85;

            const voice = getPreferredVoice();
            if (voice) utterance.voice = voice;

            utterance.onend = () => { isReadingFull = false; updateReadFullButtonUI(); };
            utterance.onerror = () => { isReadingFull = false; updateReadFullButtonUI(); };

            isReadingFull = true;
            updateReadFullButtonUI();
            window.speechSynthesis.speak(utterance);
        }

        function stopSpeech() {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
            }
            isReadingFull = false;
            updateReadFullButtonUI();
        }

        function updateReadFullButtonUI() {
            if (isReadingFull) {
                ui.readFullBtn.className = "flex items-center gap-2 px-5 py-2.5 rounded-full font-black text-[10px] uppercase tracking-widest transition-all bg-red-100 text-red-600 shadow-inner border border-red-200";
                ui.readFullIcon.innerHTML = `<span class="animate-pulse">${icons.VolumeX}</span>`;
                ui.readFullText.innerText = "Stop reading";
            } else {
                ui.readFullBtn.className = "flex items-center gap-2 px-5 py-2.5 rounded-full font-black text-[10px] uppercase tracking-widest transition-all bg-indigo-50 text-indigo-600 hover:bg-indigo-100 hover:shadow-md border border-indigo-100 hover:scale-105";
                ui.readFullIcon.innerHTML = icons.Volume2Small;
                ui.readFullText.innerText = "Read text";
            }
        }

        ui.readFullBtn.addEventListener('click', toggleReadFullText);

        // --- 7. INITIALISATIE ---
        window.onload = () => {
            loadVoices();
            if ('speechSynthesis' in window) {
                window.speechSynthesis.onvoiceschanged = loadVoices;
            }
            renderAll();
        };

        // Ruim TTS op als de gebruiker de pagina verlaat
        window.addEventListener('beforeunload', () => {
            if ('speechSynthesis' in window) window.speechSynthesis.cancel();
        });

    </script>
</body>
</html>
